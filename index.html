<style>
  :root{
    --bg:#0b1020;
    --panel:#121933;
    --panel2:#182141;
    --text:#f4f7ff;
    --muted:#b7c3e3;
    --line:rgba(255,255,255,.08);
    --green:#39d98a;
    --amber:#ffb84d;
    --red:#ff6b6b;
    --blue:#72a8ff;
    --shadow:0 24px 60px rgba(0,0,0,.35);
    --radius:24px;
    --radius-sm:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:#070b16;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif}

  body{min-height:100vh}
  .app-shell{
    max-width:430px;
    margin:0 auto;
    min-height:100vh;
    position:relative;
    padding-bottom:110px;
    background:
      radial-gradient(1200px 450px at 50% -10%, rgba(114,168,255,.18), transparent 55%),
      radial-gradient(420px 220px at 20% 0%, rgba(57,217,138,.12), transparent 60%),
      linear-gradient(180deg,#0a1022 0%,#0b1124 100%);
    box-shadow:var(--shadow);
  }
  .safe{padding:16px 16px 0}
  .status{
    display:flex;justify-content:space-between;align-items:center;
    color:#dce7ff;font-weight:600;font-size:13px;opacity:.9;padding:6px 6px 12px;
  }
  .hero{padding:8px 10px 16px}
  .glass{
    background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.03));
    border:1px solid rgba(255,255,255,.1);

    -webkit-backdrop-filter: blur(18px);
    border-radius:28px;
    box-shadow:0 16px 40px rgba(0,0,0,.25);
  }
  .hero-card{
    padding:0;
    overflow:hidden;
    position:relative;
  }
  .hero-img{
    width:100%;display:block;border-radius:28px 28px 0 0;
    object-fit:cover;max-height:220px;
  }
  .hero-content{
    padding:18px 18px 22px;
    position:relative;
  }
  .hero-content:before{
    content:"";
    position:absolute;inset:auto -40px -60px auto;
    width:180px;height:180px;border-radius:999px;
    background:radial-gradient(circle, rgba(114,168,255,.28), transparent 65%);
  }
  .eyebrow{
    display:inline-flex;gap:8px;align-items:center;
    padding:8px 12px;border-radius:999px;
    background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.09);
    font-size:12px;color:#dbe4ff
  }
  h1{margin:14px 0 10px;font-size:32px;line-height:1.02;letter-spacing:-.03em}
  .sub{color:var(--muted);font-size:14px;line-height:1.45}
  .hero-grid{
    display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:18px
  }
  .mini{
    background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);
    border-radius:18px;padding:12px
  }
  .mini .label{font-size:11px;color:#b9c6ea}
  .mini .value{font-size:14px;font-weight:700;margin-top:4px}
  .search{
    margin-top:14px;padding:12px 14px;border-radius:16px;
    width:100%;border:1px solid rgba(255,255,255,.09);
    background:rgba(255,255,255,.06);color:var(--text);font-size:15px;outline:none;
  }
  .search:focus{border-color:rgba(114,168,255,.4);background:rgba(255,255,255,.08)}
  .search::placeholder{color:#b8c5e3}
  .section{padding:0 16px 16px}
  .section-title{
    display:flex;justify-content:space-between;align-items:flex-end;gap:12px;
    margin:8px 2px 12px
  }
  .section-title h2{margin:0;font-size:20px;letter-spacing:-.02em}
  .section-title .hint{font-size:12px;color:var(--muted)}

  /* Collapsible cards */
  .card{
    padding:16px;border-radius:22px;background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.025));
    border:1px solid rgba(255,255,255,.08);margin-bottom:12px;
  }
  .card h3{margin:0 0 0;font-size:16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none}
  .card h3 .chevron{
    font-size:14px;color:var(--muted);transition:transform .25s ease;flex:0 0 auto;
    width:24px;height:24px;display:grid;place-items:center;border-radius:999px;
    background:rgba(255,255,255,.06);
  }
  .card.collapsed h3 .chevron{transform:rotate(-90deg)}
  .card .card-body{color:var(--muted);line-height:1.5;font-size:14px;margin-top:10px;overflow:hidden;transition:max-height .3s ease, opacity .25s ease}
  .card.collapsed .card-body{max-height:0 !important;opacity:0;margin-top:0}
  .card p{margin:0;color:var(--muted);line-height:1.5;font-size:14px}

  .list{display:grid;gap:10px;margin-top:12px}
  .pill-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
  .pill{padding:7px 10px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);font-size:12px;color:#dbe4ff}
  .tag-ok{background:rgba(57,217,138,.12);color:#bff3d8;border-color:rgba(57,217,138,.28)}
  .tag-warn{background:rgba(255,184,77,.12);color:#ffe0ae;border-color:rgba(255,184,77,.28)}
  .tag-alert{background:rgba(255,107,107,.12);color:#ffd0d0;border-color:rgba(255,107,107,.28)}
  .checklist{list-style:none;padding:0;margin:12px 0 0;display:grid;gap:10px}
  .checklist li{display:flex;gap:10px;align-items:flex-start;color:var(--text);font-size:14px;line-height:1.45}
  .dot{
    width:22px;height:22px;display:inline-grid;place-items:center;border-radius:999px;flex:0 0 auto;
    margin-top:1px;background:rgba(114,168,255,.18);border:1px solid rgba(114,168,255,.28);color:#cfe0ff;font-size:12px
  }
  .route{
    display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;
    margin-top:10px;padding:12px;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06)
  }
  .route .city{font-weight:700}
  .route .arrow{color:#9ec2ff}
  .callout{
    padding:14px;border-radius:18px;
    background:linear-gradient(180deg,rgba(114,168,255,.12),rgba(114,168,255,.05));
    border:1px solid rgba(114,168,255,.2);margin-top:12px
  }
  .callout strong{display:block;margin-bottom:6px}
  .sources{display:grid;gap:10px}
  .source{
    padding:13px;border-radius:16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06)
  }
  .source .top{display:flex;justify-content:space-between;gap:10px;margin-bottom:6px}
  .source .name{font-weight:700;font-size:14px}
  .source .stamp{font-size:11px;color:#b7c3e3}
  .source .desc{font-size:13px;color:var(--muted);line-height:1.45}
  .update-box{
    background:linear-gradient(180deg,rgba(57,217,138,.09),rgba(255,255,255,.03));
    border-color:rgba(57,217,138,.16)
  }
  .code{
    display:block;white-space:pre-wrap;word-break:break-word;

    font-size:12px;line-height:1.5;padding:12px;border-radius:14px;
    background:#0a1020;border:1px solid rgba(255,255,255,.08);color:#d5e3ff;margin-top:10px
  }

  .action-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
  .action-btn{
    padding:14px 12px;border-radius:18px;border:1px solid rgba(255,255,255,.1);
    background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.03));
    color:var(--text);font-size:13px;font-weight:600;cursor:pointer;
    display:flex;align-items:center;gap:8px;transition:all .2s;text-align:left;
  }

  .action-btn:active{transform:scale(.97)}
  .action-btn .icon{font-size:18px}

  .phrase-grid{display:grid;gap:2px;margin-top:12px}
  .phrase-row{
    display:grid;grid-template-columns:1fr 1fr;gap:12px;
    padding:12px 14px;border-radius:14px;
    background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.05);
  }
  .phrase-row .es{font-weight:700;font-size:14px}
  .phrase-row .en{font-size:13px;color:var(--muted)}

  /* Neighbourhood pills */
  .hood-grid{display:grid;gap:10px;margin-top:12px}
  .hood-card{
    padding:14px;border-radius:18px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.025));
    border:1px solid rgba(255,255,255,.08);
  }

  .hood-card .hood-vibe{font-size:12px;color:var(--blue)}
  .hood-card .hood-desc{font-size:13px;color:var(--muted);line-height:1.45;margin-top:6px}

  /* Food item */
  .food-grid{display:grid;gap:10px;margin-top:12px}
  .food-item{
    padding:14px;border-radius:18px;
    background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);
    display:flex;gap:12px;align-items:flex-start;
  }
  .food-emoji{font-size:24px;flex:0 0 auto}
  .food-info .food-name{font-weight:700;font-size:14px}
  .food-info .food-desc{font-size:13px;color:var(--muted);line-height:1.4;margin-top:3px}

  /* Contact card */
  .contact-card{
    padding:14px;border-radius:18px;
    background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);
    margin-bottom:10px;
  }
  .contact-card .contact-name{font-size:13px;color:var(--muted)}
  .contact-card .contact-value{font-size:18px;font-weight:700;margin-top:4px;letter-spacing:-.01em}
  .contact-card .contact-note{font-size:12px;color:#a0b0d0;margin-top:4px;line-height:1.4}

  .bottom-nav{
    position:fixed;left:50%;transform:translateX(-50%);
    bottom:12px;width:min(398px,calc(100vw - 24px));
    padding:8px 6px;border-radius:24px;
    background:rgba(16,24,46,.92);
    border:1px solid rgba(255,255,255,.1);
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    display:flex;align-items:center;gap:4px;z-index:20;
    box-shadow:0 18px 40px rgba(0,0,0,.35);
  }
  .nav-chevron{
    flex:0 0 auto;display:grid;place-items:center;width:36px;height:48px;
    color:rgba(255,255,255,.5);font-size:20px;font-weight:700;cursor:pointer;
    border-radius:12px;transition:all .2s;
  }
  .nav-chevron:active{background:rgba(255,255,255,.1);color:white}
  .tab{
    flex:0 0 auto;text-align:center;padding:10px 10px;border-radius:12px;
    font-size:11px;font-weight:700;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:3px;min-width:52px;
    transition:all .2s;
    color:#e8eeff;
    background:linear-gradient(165deg,rgba(255,255,255,.14),rgba(255,255,255,.05));
    border:1px solid rgba(255,255,255,.18);
    box-shadow:0 4px 16px rgba(0,0,0,.2), inset 0 1px 0 rgba(255,255,255,.15), inset 0 -1px 0 rgba(0,0,0,.1);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  }
  .tab .tab-icon{width:20px;height:20px;display:block}
  .tab .tab-icon svg{width:20px;height:20px;fill:currentColor}
  .tab.active{
    background:linear-gradient(165deg,rgba(114,168,255,.35),rgba(80,140,255,.15));
    color:white;
    border-color:rgba(114,168,255,.4);
    box-shadow:0 4px 20px rgba(114,168,255,.3), inset 0 1px 0 rgba(255,255,255,.2), inset 0 -1px 0 rgba(0,0,0,.1);
  }
  .page{display:none}
  .page.active{display:block}
  .hero-note{margin-top:12px;font-size:12px;color:#cbd7f4}
  .footer{
    color:#90a0c6;font-size:12px;line-height:1.5;padding:10px 18px 110px
  }
  .hidden{display:none !important}

  /* Changelog */
  .log-entry{
    padding:14px;border-radius:18px;
    background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);
    margin-bottom:10px;position:relative;
    border-left:3px solid rgba(114,168,255,.4);
  }
  .log-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .log-date{font-size:12px;color:var(--blue);font-weight:600;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  .log-title{font-size:15px;font-weight:700}
  .log-body{font-size:13px;color:var(--muted);line-height:1.45;margin-top:6px}

  /* Scrollbar hide for nav */
  #bottomNav::-webkit-scrollbar{display:none}
</style>
</head>

function makeEl(tag, cls, html){
  const el = document.createElement(tag);
  if (cls) el.className = cls;
  if (html !== undefined) el.innerHTML = html;
  return el;
}

function renderCollapsibleCard(card){
  const el = makeEl('div', 'card' + (card.collapsed ? ' collapsed' : ''));
  const h3 = makeEl('h3', null, `<span>${card.title}</span><span class="chevron">›</span>`);
  const body = makeEl('div', 'card-body', `<p>${card.body}</p>`);
  el.appendChild(h3);
  el.appendChild(body);
  h3.addEventListener('click', () => {
    el.classList.toggle('collapsed');
  });
  return el;
}

function renderPage(pageId, content){
  const section = makeEl('section','page section');
  section.id = `page-${pageId}`;

  if (content.hero){
    const heroWrap = makeEl('div','hero');
    heroWrap.innerHTML = `
      <div class="glass hero-card">
        <img class="hero-img" src="hero.jpg" alt="Estadio Azteca at sunset, Irish and Mexican fans filling the stands" />
        <div class="hero-content">
          <div class="eyebrow">🇮🇪 Ireland · 🇲🇽 Mexico · ⚽ World Cup 2026</div>
          <h1>Ireland vs Mexico<br>in Mexico City</h1>
          <div class="sub">If Ireland qualifies, they face Mexico at <strong>Estadio Azteca</strong> on <strong>Thursday 11 June 2026</strong>, the tournament's opening match. Mexico City is the only city in the world to host a World Cup opener for the third time.</div>
          <div class="hero-grid">
            <div class="mini"><div class="label">Match day</div><div class="value">11 Jun</div></div>
            <div class="mini"><div class="label">Venue</div><div class="value">Azteca</div></div>
            <div class="mini"><div class="label">Capacity</div><div class="value">87,500</div></div>
          </div>
          <input id="searchInput" class="search" type="search" placeholder="Search: tickets, Roma, embassy, tacos…" />
        </div>
      </div>
    `;
    section.appendChild(heroWrap);
  }

  const title = makeEl('div','section-title',
    `<h2>${content.title}</h2><div class="hint">${content.hint || ""}</div>`);
  section.appendChild(title);

  (content.cards || []).forEach(card => {
    section.appendChild(renderCollapsibleCard(card));
  });

  if (content.neighborhoods){
    const grid = makeEl('div','hood-grid');
    content.neighborhoods.forEach(n => {
      const card = makeEl('div','hood-card',
        `<div class="hood-name">${n.name}</div><div class="hood-vibe">${n.vibe}</div><div class="hood-desc">${n.desc}</div>`);
      grid.appendChild(card);
    });
    section.appendChild(grid);
  }

  if (content.foods){
    const grid = makeEl('div','food-grid');
    content.foods.forEach(f => {
      const item = makeEl('div','food-item',
        `<div class="food-emoji">${f.emoji}</div><div class="food-info"><div class="food-name">${f.name}</div><div class="food-desc">${f.desc}</div></div>`);
      grid.appendChild(item);
    });
    section.appendChild(grid);
  }

  if (content.phrases){
    const grid = makeEl('div','phrase-grid');
    content.phrases.forEach(p => {
      const row = makeEl('div','phrase-row',
        `<div class="es">${p.es}</div><div class="en">${p.en}</div>`);
      grid.appendChild(row);
    });
    section.appendChild(grid);
  }

  if (content.route){
    const route = makeEl('div','route');
    route.innerHTML = `
      <div><div class="label">From</div><div class="city">${content.route.from}</div></div>
      <div class="arrow">→ ${content.route.mid} →</div>
      <div style="text-align:right"><div class="label">To</div><div class="city">${content.route.to}</div></div>
    `;
    section.appendChild(route);
  }

  if (content.checklistTitle){
    section.appendChild(makeEl('div','section-title',`<h2 style="font-size:18px">${content.checklistTitle}</h2>`));
    const ul = makeEl('ul','checklist');
    (content.checklist || []).forEach(item => {
      ul.appendChild(makeEl('li',null,`<span class="dot">✓</span><span>${item}</span>`));
    });
    section.appendChild(ul);
  }

  if (content.actions){
    const row = makeEl('div','action-row');
    content.actions.forEach(a => {
      const btn = makeEl('a','action-btn',`<span class="icon">${a.icon}</span><span>${a.label}</span>`);
      btn.href = a.url;
      btn.target = "_blank";
      btn.rel = "noopener";
      row.appendChild(btn);
    });
    section.appendChild(row);
  }

  if (content.contacts){
    const wrap = makeEl('div','list');
    section.appendChild(makeEl('div','section-title',`<h2 style="font-size:18px">Emergency contacts</h2>`));
    content.contacts.forEach(c => {
      const el = makeEl('div','contact-card',
        `<div class="contact-name">${c.name}</div><div class="contact-value">${c.value}</div><div class="contact-note">${c.note}</div>`);
      wrap.appendChild(el);
    });
    section.appendChild(wrap);
  }

  if (content.callout){
    section.appendChild(makeEl('div','callout',`<strong>${content.callout.title}</strong><div class="sub" style="color:#dce7ff">${content.callout.body}</div>`));
  }

  if (content.sourcesList){
    section.appendChild(makeEl('div','section-title',`<h2 style="font-size:18px">Source log</h2>`));
    const sources = makeEl('div','sources');
    content.sourcesList.forEach(s => {
      const item = makeEl('div','source');
      item.innerHTML = `
        <div class="top">
          <div class="name">${s.name}</div>
          <div class="stamp">${s.checked}</div>
        </div>
        <div class="desc">${s.desc}</div>
        <div style="margin-top:8px"><a href="${s.url}" target="_blank" rel="noopener">Open ↗</a></div>
      `;
      sources.appendChild(item);
    });
    section.appendChild(sources);
  }

  if (content.showViews){
    const vc = makeEl('div','card',
      `<div style="display:flex;align-items:center;gap:10px"><div style="font-size:24px;font-weight:800;letter-spacing:-.02em" id="viewCount">—</div><div style="font-size:13px;color:var(--muted)">page views since launch</div></div>`);
    section.appendChild(vc);
  }

  if (content.logEntries){
    const wrap = makeEl('div','list');
    content.logEntries.forEach(e => {
      const entry = makeEl('div','log-entry',
        `<div class="log-meta"><div class="log-date">${e.date} ${e.time}</div></div><div class="log-title">${e.title}</div><div class="log-body">${e.body}</div>`);
      wrap.appendChild(entry);
    });
    section.appendChild(wrap);
  }

  return section;
}

function render(){
  const pagesRoot = document.getElementById('pages');
  const navRoot = document.getElementById('bottomNav');

  GUIDE_DATA.tabs.forEach((tab, i) => {
    pagesRoot.appendChild(renderPage(tab.id, GUIDE_DATA.pages[tab.id]));
    const btn = makeEl('button','tab' + (i===0 ? ' active' : ''),
      `<span class="tab-icon">${tab.icon}</span>${tab.label}`);
    btn.type = "button";
    btn.dataset.target = tab.id;
    btn.addEventListener('click',()=>activateTab(tab.id));
    navRoot.appendChild(btn);
  });

  activateTab(GUIDE_DATA.tabs[0].id);
}

function activateTab(id){
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const page = document.getElementById(`page-${id}`);
  if(page) page.classList.add('active');
  const tab = document.querySelector(`.tab[data-target="${id}"]`);
  if(tab) tab.classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

function setupSearch(){
  const input = document.getElementById('searchInput');
  input.addEventListener('input', e => {
    const q = e.target.value.trim().toLowerCase();
    if(q){
      // Find the tab that has the most matches
      let bestTab = null, bestCount = 0;
      GUIDE_DATA.tabs.forEach(tab => {
        const page = document.getElementById(`page-${tab.id}`);
        if(!page) return;
        const items = page.querySelectorAll('.card, .callout, .checklist li, .source, .food-item, .phrase-row, .hood-card, .contact-card');
        let count = 0;
        items.forEach(el => {
          const match = el.textContent.toLowerCase().includes(q);
          if(match) count++;
        });
        if(count > bestCount){ bestCount = count; bestTab = tab.id; }
      });
      if(bestTab) activateTab(bestTab);
    }
    const activePage = document.querySelector('.page.active');
    if(!activePage) return;
    activePage.querySelectorAll('.card, .callout, .checklist li, .source, .food-item, .phrase-row, .hood-card, .contact-card').forEach(el => {
      const txt = el.textContent.toLowerCase();
      el.classList.toggle('hidden', q && !txt.includes(q));
      // Auto-expand matching collapsed cards
      if(q && txt.includes(q) && el.classList.contains('card') && el.classList.contains('collapsed')){
        el.classList.remove('collapsed');
      }
    });
  });
}

render();
setupSearch();

fetch('https://mex-counter.victordelrosal.workers.dev')
  .then(r=>r.json())
  .then(d=>{const el=document.getElementById('viewCount');if(el)el.textContent=d.views.toLocaleString()})
  .catch(()=>{});
</script>
